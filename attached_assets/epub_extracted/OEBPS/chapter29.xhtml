<p class="chapter-number">CHAPTER 29</p>
<p class="chapter-title">Walking the Path of Union</p>
<p class="no-indent">Throughout this book we have explored a central idea: the invitation to live in union with God. This concept may sound mysterious at first, yet it reflects a simple truth that runs through the entire story of the Gospel. God desires relationship with humanity.</p>
